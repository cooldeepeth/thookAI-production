name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install linting tools
        run: pip install flake8

      - name: Run flake8
        run: |
          cd backend
          flake8 . \
            --max-line-length=120 \
            --exclude=__pycache__,.git,.venv,venv,tests,scripts \
            --select=E9,F63,F7,F82 \
            --count --statistics

  backend-test-billing:
    name: Backend Tests — Billing (95% coverage gate)
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run billing tests (95% branch coverage required)
        env:
          MONGO_URL: mongodb://localhost:27017
          DB_NAME: thookai_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: ci-test-secret-key-not-for-production
          FERNET_KEY: 7X2PqyChA8TwDuzvdaeX_0Yh0SbmvZzxrjDXDwjCRCI=
          ENVIRONMENT: test
        run: |
          cd backend
          python -m pytest tests/billing/ tests/test_credits_billing.py tests/test_stripe_billing.py \
            --cov=services/credits.py \
            --cov=services/stripe_service.py \
            --cov=routes/billing.py \
            --cov-branch \
            --cov-report=term-missing \
            --cov-fail-under=95 \
            -v --tb=short

  backend-test-security:
    name: Backend Tests — Security (85% coverage gate)
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run security tests (85% branch coverage required)
        env:
          MONGO_URL: mongodb://localhost:27017
          DB_NAME: thookai_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: ci-test-secret-key-not-for-production
          FERNET_KEY: 7X2PqyChA8TwDuzvdaeX_0Yh0SbmvZzxrjDXDwjCRCI=
          ENVIRONMENT: test
        run: |
          cd backend
          python -m pytest \
            tests/test_auth_core.py \
            tests/test_oauth_flows.py \
            tests/test_rate_limit.py \
            tests/test_rate_limit_concurrent.py \
            tests/test_n8n_security.py \
            tests/security/ \
            --cov=auth_utils.py \
            --cov=routes/auth.py \
            --cov=routes/auth_google.py \
            --cov=middleware/security.py \
            --cov-branch \
            --cov-report=term-missing \
            --cov-fail-under=85 \
            -v --tb=short
        continue-on-error: true

  backend-test-pipeline:
    name: Backend Tests — Pipeline & Agents (85% coverage gate)
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run pipeline and agent tests (85% branch coverage required)
        env:
          MONGO_URL: mongodb://localhost:27017
          DB_NAME: thookai_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: ci-test-secret-key-not-for-production
          FERNET_KEY: 7X2PqyChA8TwDuzvdaeX_0Yh0SbmvZzxrjDXDwjCRCI=
          ENVIRONMENT: test
        run: |
          cd backend
          python -m pytest \
            tests/test_pipeline_e2e.py \
            tests/test_pipeline_integration.py \
            tests/test_strategist.py \
            tests/test_strategy_routes.py \
            tests/test_lightrag_service.py \
            tests/test_lightrag_integration.py \
            tests/test_lightrag_isolation.py \
            tests/test_media_orchestrator.py \
            tests/test_media_pipeline_ledger.py \
            tests/test_n8n_bridge.py \
            tests/test_obsidian_service.py \
            tests/test_obsidian_agents.py \
            tests/test_obsidian_routes.py \
            tests/test_analytics_social.py \
            tests/core/ \
            --cov=agents/ \
            --cov=services/ \
            --cov-branch \
            --cov-report=term-missing \
            --cov-fail-under=85 \
            -v --tb=short
        continue-on-error: true

  backend-test-general:
    name: Backend Tests — General (catch-all)
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run general tests (catch-all, no coverage gate)
        env:
          MONGO_URL: mongodb://localhost:27017
          DB_NAME: thookai_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: ci-test-secret-key-not-for-production
          FERNET_KEY: 7X2PqyChA8TwDuzvdaeX_0Yh0SbmvZzxrjDXDwjCRCI=
          ENVIRONMENT: test
        run: |
          cd backend
          python -m pytest tests/ \
            --ignore=tests/billing \
            --ignore=tests/test_credits_billing.py \
            --ignore=tests/test_stripe_billing.py \
            --ignore=tests/test_auth_core.py \
            --ignore=tests/test_oauth_flows.py \
            --ignore=tests/test_rate_limit.py \
            --ignore=tests/test_rate_limit_concurrent.py \
            --ignore=tests/test_n8n_security.py \
            --ignore=tests/test_pipeline_e2e.py \
            --ignore=tests/test_pipeline_integration.py \
            --ignore=tests/test_strategist.py \
            --ignore=tests/test_strategy_routes.py \
            --ignore=tests/test_lightrag_service.py \
            --ignore=tests/test_lightrag_integration.py \
            --ignore=tests/test_lightrag_isolation.py \
            --ignore=tests/test_media_orchestrator.py \
            --ignore=tests/test_media_pipeline_ledger.py \
            --ignore=tests/test_n8n_bridge.py \
            --ignore=tests/test_obsidian_service.py \
            --ignore=tests/test_obsidian_agents.py \
            --ignore=tests/test_obsidian_routes.py \
            --ignore=tests/test_analytics_social.py \
            -v --tb=short

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Build
        env:
          CI: false
        run: |
          cd frontend
          npm run build
